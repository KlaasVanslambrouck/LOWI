<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --surface: #111114;
    --amber: #d4a048;
    --amber-dim: #b08030;
    --text: #f0ebe4;
    --muted: #a8a29c;
    --border: #333028;
  }

  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'EB Garamond', Georgia, serif; overflow-x: hidden; }

  /* Skip link */
  .skip-link { position: fixed; top: -100px; left: 1rem; z-index: 999; background: var(--amber); color: #0a0a0b; font-family: 'Space Mono', monospace; font-size: .75rem; padding: .5rem 1rem; text-decoration: none; transition: top .2s; }
  .skip-link:focus { top: 1rem; }

  /* Focus */
  :focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; }

  /* Canvas */
  #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* Layout */
  .wrap { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 5rem 1.5rem 6rem; }

  /* Header */
  .site-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4rem; }
  .site-logo { font-family: 'Space Mono', monospace; font-size: 1.3rem; letter-spacing: .25em; color: var(--amber); text-decoration: none; transition: opacity .2s; }
  .site-logo:hover { opacity: .7; }
  .back-link { font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: #c8c2bc; text-decoration: none; opacity: .85; transition: opacity .2s, color .2s; }
  .back-link:hover { opacity: 1; color: var(--amber); }

  /* Intro */
  .page-label { font-family: 'Space Mono', monospace; font-size: clamp(.65rem,1.5vw,.8rem); letter-spacing: .4em; text-transform: uppercase; color: var(--amber-dim); margin-bottom: 1rem; }
  .page-intro { font-size: clamp(1.1rem,3vw,1.4rem); font-style: italic; color: var(--text); margin-bottom: 3rem; line-height: 1.5; }
  .divider { width: 1px; height: 2.5rem; background: linear-gradient(to bottom, transparent, var(--amber-dim), transparent); margin-bottom: 3rem; }

  /* Lijst */
  .transmissie-lijst { display: flex; flex-direction: column; }
  .transmissie-item { padding: 1.75rem 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .2s; text-decoration: none; display: block; color: inherit; }
  .transmissie-item:first-child { border-top: 1px solid var(--border); }
  .transmissie-item:hover { opacity: .7; }
  .t-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: .6rem; }
  .t-type { font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: .25em; text-transform: uppercase; color: var(--amber-dim); }
  .t-date { font-family: 'Space Mono', monospace; font-size: .6rem; color: var(--muted); }
  .t-title { font-size: clamp(1.1rem,2.5vw,1.35rem); color: var(--text); line-height: 1.4; margin-bottom: .4rem; }
  .t-excerpt { font-size: .95rem; color: var(--muted); line-height: 1.6; font-style: italic; }

  /* Laadstatus */
  .status { font-family: 'Space Mono', monospace; font-size: .7rem; letter-spacing: .2em; color: var(--muted); padding: 2rem 0; }

  /* Detail */
  .detail { display: none; }
  .detail.active { display: block; }
  .lijst-wrap.verborgen { display: none; }

  .detail-terug { font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: #c8c2bc; cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 3rem; opacity: .85; transition: opacity .2s, color .2s; }
  .detail-terug:hover { opacity: 1; color: var(--amber); }
  .detail-type { font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: .3em; text-transform: uppercase; color: var(--amber-dim); margin-bottom: .75rem; }
  .detail-titel { font-size: clamp(1.5rem,4vw,2.2rem); color: var(--text); line-height: 1.3; margin-bottom: .75rem; }
  .detail-datum { font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--muted); margin-bottom: 2.5rem; }
  .detail-divider { width: 1px; height: 2rem; background: linear-gradient(to bottom, transparent, var(--amber-dim), transparent); margin-bottom: 2.5rem; }
  .detail-body { font-size: clamp(1rem,2vw,1.15rem); line-height: 1.9; color: var(--text); }
  .detail-body p { margin-bottom: 1.25em; }
  .detail-body h1, .detail-body h2, .detail-body h3 { font-size: 1.1rem; color: var(--amber); margin: 2em 0 .75em; font-family: 'Space Mono', monospace; font-weight: 400; letter-spacing: .1em; }
  .detail-body strong { color: var(--amber); font-weight: 500; }
  .detail-body em { font-style: italic; }
  .detail-body a { color: var(--amber); text-underline-offset: 3px; }
  .detail-body blockquote { border-left: 1px solid var(--amber-dim); padding-left: 1.25rem; color: var(--muted); font-style: italic; margin: 1.5em 0; }

  /* Footer */
  footer { text-align: center; font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .3em; color: var(--muted); padding: 3rem 0 1.5rem; }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    #bgCanvas { display: none; }
  }

  /* Mobile */
  @media (max-width: 600px) {
    .wrap { padding: 3rem 1.2rem 4rem; }
    .site-header { margin-bottom: 2.5rem; }
  }

</head>
<body>

<a href="#main" class="skip-link">Naar inhoud</a>
<canvas id="bgCanvas" aria-hidden="true"></canvas>

<main class="wrap" id="main">
  <header class="site-header">
    <a href="/" class="site-logo" aria-label="Terug naar LOWI homepage">LOWI</a>
    <a href="/" class="back-link" aria-label="Terug naar homepage">← terug</a>
  </header>

  <!-- Lijst -->
  <div class="lijst-wrap" id="lijstWrap">
    <div class="page-label" role="heading" aria-level="1">Transmissies</div>
    <p class="page-intro">Signalen vanuit het lab.<br>Ruw, reflectief, en in beweging.</p>
    <div class="divider" aria-hidden="true"></div>
    <div class="transmissie-lijst" id="transmissieLijst" role="list" aria-live="polite" aria-label="Lijst van transmissies">
      <div class="status" role="status">Signalen ophalen...</div>
    </div>
  </div>

  <!-- Detail -->
  <div class="detail" id="detailWrap" aria-live="polite">
    <button class="detail-terug" onclick="toonLijst()" aria-label="Terug naar alle transmissies">← alle transmissies</button>
    <div class="detail-type" id="detailType"></div>
    <h1 class="detail-titel" id="detailTitel"></h1>
    <div class="detail-datum" id="detailDatum"></div>
    <div class="detail-divider" aria-hidden="true"></div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <footer>LOWI &nbsp;·&nbsp; © 2026</footer>
</main>

<script>
// ── Achtergrond deeltjes ──
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
let PW, PH, bgParticles = [];

function resizeBg() { PW = bgCanvas.width = window.innerWidth; PH = bgCanvas.height = window.innerHeight; }
function mkP() { return { x:Math.random()*PW, y:Math.random()*PH, r:Math.random()*1.2+.3, dx:(Math.random()-.5)*.15, dy:-Math.random()*.2-.05, alpha:Math.random()*.4+.05, fade:Math.random()*.003+.001 }; }
function initBg() { resizeBg(); bgParticles = Array.from({length:60}, mkP); }
function drawBg() {
  bgCtx.clearRect(0,0,PW,PH);
  for (let p of bgParticles) {
    bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgCtx.fillStyle = `rgba(212,160,72,${p.alpha})`; bgCtx.fill();
    p.x+=p.dx; p.y+=p.dy; p.alpha-=p.fade;
    if (p.alpha<=0||p.y<-5) Object.assign(p, mkP(), {y:PH+5, alpha:Math.random()*.3+.05});
  }
  requestAnimationFrame(drawBg);
}
window.addEventListener('resize', resizeBg);
initBg(); drawBg();

// ── Markdown parser ──
function parseMarkdown(md) {
  return '<p>' + md
    .replace(/^### (.+)$/gm, '</p><h3>$1</h3><p>')
    .replace(/^## (.+)$/gm, '</p><h2>$1</h2><p>')
    .replace(/^# (.+)$/gm, '</p><h1>$1</h1><p>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^> (.+)$/gm, '</p><blockquote>$1</blockquote><p>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>')
    .replace(/\n\n/g, '</p><p>')
    + '</p>';
}

// ── Frontmatter parser ──
function parseFrontmatter(content) {
  const match = content.match(/^---\n([\s\S]+?)\n---\n([\s\S]*)$/);
  if (!match) return { meta: {}, body: content };
  const meta = {};
  match[1].split('\n').forEach(line => {
    const [k, ...v] = line.split(':');
    if (k) meta[k.trim()] = v.join(':').trim().replace(/^["']|["']$/g, '');
  });
  return { meta, body: match[2].trim() };
}

// ── Datum formatteren ──
function formatDatum(str) {
  if (!str) return '';
  return new Date(str).toLocaleDateString('nl-BE', { day:'numeric', month:'long', year:'numeric' });
}

// ── Excerpt ──
function excerpt(body, len=120) {
  return body.replace(/[#*_>`\[\]]/g,'').trim().slice(0, len) + '…';
}

// ── Transmissies laden ──
async function laadTransmissies() {
  const lijst = document.getElementById('transmissieLijst');
  try {
    const res = await fetch('/.netlify/functions/transmissies');
    const data = await res.json();

    if (!data.transmissies || !data.transmissies.length) {
      lijst.innerHTML = '<div class="status">Nog geen transmissies.</div>';
      return;
    }

    const items = data.transmissies.map(f => ({ ...parseFrontmatter(f.content), slug: f.slug }));

    lijst.innerHTML = '';
    items.forEach(item => {
      const el = document.createElement('a');
      el.className = 'transmissie-item';
      el.href = '#';
      el.setAttribute('role', 'listitem');
      el.setAttribute('aria-label', item.meta.title || 'Zonder titel');
      el.innerHTML = `
        <div class="t-meta">
          <span class="t-type">${item.meta.type || 'Lab note'}</span>
          <span class="t-date">${formatDatum(item.meta.date)}</span>
        </div>
        <div class="t-title">${item.meta.title || 'Zonder titel'}</div>
        <div class="t-excerpt">${excerpt(item.body)}</div>
      `;
      el.addEventListener('click', e => { e.preventDefault(); toonDetail(item); });
      el.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); toonDetail(item); } });
      lijst.appendChild(el);
    });
  } catch {
    lijst.innerHTML = '<div class="status">Kon signalen niet ophalen. Probeer later opnieuw.</div>';
  }
}

// ── Detail tonen ──
function toonDetail(item) {
  document.getElementById('lijstWrap').classList.add('verborgen');
  document.getElementById('detailType').textContent = item.meta.type || 'Lab note';
  document.getElementById('detailTitel').textContent = item.meta.title || 'Zonder titel';
  document.getElementById('detailDatum').textContent = formatDatum(item.meta.date);
  document.getElementById('detailBody').innerHTML = parseMarkdown(item.body);
  document.getElementById('detailWrap').classList.add('active');
  window.scrollTo(0, 0);
  // Update page title voor SEO/toegankelijkheid
  document.title = `${item.meta.title || 'Transmissie'} — LOWI`;
}

function toonLijst() {
  document.getElementById('detailWrap').classList.remove('active');
  document.getElementById('lijstWrap').classList.remove('verborgen');
  window.scrollTo(0, 0);
  document.title = 'Transmissies — LOWI';
}

laadTransmissies();
</script>
</body>
</html>
